<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - EduCommerce</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .admin-container {
            max-width: 1000px;
            margin: 2rem auto;
            background: #fff;
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            border-bottom: 2px solid var(--bg-color);
            padding-bottom: 1rem;
        }

        .form-section {
            background: var(--bg-color);
            padding: 1.5rem;
            border-radius: 8px;
            margin-bottom: 2rem;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: bold;
        }

        .form-group input {
            width: 100%;
            padding: 0.7rem;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        .admin-table {
            width: 100%;
            border-collapse: collapse;
        }

        .admin-table th, .admin-table td {
            text-align: left;
            padding: 1rem;
            border-bottom: 1px solid #eee;
        }

        .admin-table th {
            background: var(--secondary-color);
            color: #fff;
        }

        .edit-btn {
            background: #2196f3;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 4px;
            cursor: pointer;
            margin-right: 5px;
        }

        .delete-btn {
            background: #f44336;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 4px;
            cursor: pointer;
        }

        .btn-primary {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 0.8rem 1.5rem;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }

        .btn-secondary {
            background: #777;
            color: white;
            border: none;
            padding: 0.8rem 1.5rem;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            display: none;
        }
    </style>
</head>
<body>
    <header>
        <a href="index.html" class="logo">Edu<span>Commerce</span> Admin</a>
        <nav class="nav-links">
            <a href="index.html">View Store</a>
        </nav>
    </header>

    <div class="admin-container">
        <div class="admin-header">
            <h2>Product Management</h2>
        </div>

        <div class="form-section">
            <h3 id="form-title">Add New Product</h3>
            <form id="product-form">
                <input type="hidden" id="prod-id">
                <div class="form-group">
                    <label>Product Name</label>
                    <input type="text" id="prod-name" required placeholder="e.g. iPhone 15">
                </div>
                <div class="form-group">
                    <label>Price ($)</label>
                    <input type="number" id="prod-price" required placeholder="e.g. 999">
                </div>
                <div class="form-group">
                    <label>Image URL</label>
                    <input type="url" id="prod-image" required placeholder="https://example.com/image.jpg">
                </div>
                <button type="submit" id="submit-btn" class="btn-primary">Add Product</button>
                <button type="button" id="cancel-btn" class="btn-secondary">Cancel</button>
            </form>
        </div>

        <table class="admin-table">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Image</th>
                    <th>Name</th>
                    <th>Price</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="admin-product-body">
                <!-- Products will be loaded here -->
            </tbody>
        </table>
    </div>

    <script src="script.js"></script>
</body>
</html>
