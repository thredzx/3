<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - A2Zloot</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap">
</head>
<body>
    <header>
        <a href="index.html" class="logo">A2Z<span>loot</span> Admin</a>
        <nav class="nav-links">
            <a href="index.html">View Store</a>
            <a href="#" onclick="logout()" style="color: #f44336;">Logout</a>
        </nav>
    </header>

    <div class="admin-container">
        <div class="admin-header">
            <h2>Product Management</h2>
        </div>

        <div class="form-section">
            <h3 id="form-title">Add New Product</h3>
            <form id="product-form">
                <input type="hidden" id="prod-id">
                <div class="form-group">
                    <label>Product Name</label>
                    <input type="text" id="prod-name" required placeholder="e.g. iPhone 15">
                </div>
                <div class="form-group">
                    <label>Category</label>
                    <input type="text" id="prod-category" required placeholder="e.g. ELECTRONICS">
                </div>
                <div class="form-group">
                    <label>Price ($)</label>
                    <input type="number" id="prod-price" required placeholder="e.g. 999">
                </div>
                <div class="form-group">
                    <label>Image URL</label>
                    <input type="url" id="prod-image" required placeholder="https://example.com/image.jpg">
                </div>
                <button type="submit" id="submit-btn" class="btn-primary">Add Product</button>
                <button type="button" id="cancel-btn" class="btn-secondary">Cancel</button>
            </form>
        </div>

        <table class="admin-table">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Image</th>
                    <th>Name</th>
                    <th>Price</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="admin-product-body">
                <!-- Products will be loaded here -->
            </tbody>
        </table>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
