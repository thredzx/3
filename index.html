<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduCommerce - Shop Online</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <a href="#" class="logo">Edu<span>Commerce</span></a>
        
        <div class="search-container">
            <input type="text" placeholder="Search for products...">
            <button type="button">Search</button>
        </div>

        <nav class="nav-links">
            <a href="#">Login</a>
            <a href="#">Cart (<span id="cart-count">0</span>)</a>
        </nav>
    </header>

    <main>
        <div class="product-grid">
            <!-- Product 1 -->
            <div class="product-card">
                <img src="https://picsum.photos/seed/phone/400/300" alt="Smartphone X" class="product-image" referrerPolicy="no-referrer">
                <div class="product-info">
                    <h3 class="product-title">Smartphone X</h3>
                    <p class="product-price">$599</p>
                    <button class="buy-btn">Buy Now</button>
                </div>
            </div>

            <!-- Product 2 -->
            <div class="product-card">
                <img src="https://picsum.photos/seed/jacket/400/300" alt="Designer Jacket" class="product-image" referrerPolicy="no-referrer">
                <div class="product-info">
                    <h3 class="product-title">Designer Jacket</h3>
                    <p class="product-price">$120</p>
                    <button class="buy-btn">Buy Now</button>
                </div>
            </div>

            <!-- Product 3 -->
            <div class="product-card">
                <img src="https://picsum.photos/seed/earbuds/400/300" alt="Wireless Earbuds" class="product-image" referrerPolicy="no-referrer">
                <div class="product-info">
                    <h3 class="product-title">Wireless Earbuds</h3>
                    <p class="product-price">$80</p>
                    <button class="buy-btn">Buy Now</button>
                </div>
            </div>

            <!-- Product 4 -->
            <div class="product-card">
                <img src="https://picsum.photos/seed/coffee/400/300" alt="Coffee Maker" class="product-image" referrerPolicy="no-referrer">
                <div class="product-info">
                    <h3 class="product-title">Coffee Maker</h3>
                    <p class="product-price">$45</p>
                    <button class="buy-btn">Buy Now</button>
                </div>
            </div>

            <!-- Product 5 -->
            <div class="product-card">
                <img src="https://picsum.photos/seed/shoes/400/300" alt="Running Shoes" class="product-image" referrerPolicy="no-referrer">
                <div class="product-info">
                    <h3 class="product-title">Running Shoes</h3>
                    <p class="product-price">$95</p>
                    <button class="buy-btn">Buy Now</button>
                </div>
            </div>

            <!-- Product 6 -->
            <div class="product-card">
                <img src="https://picsum.photos/seed/watch/400/300" alt="Smart Watch" class="product-image" referrerPolicy="no-referrer">
                <div class="product-info">
                    <h3 class="product-title">Smart Watch</h3>
                    <p class="product-price">$199</p>
                    <button class="buy-btn">Buy Now</button>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
